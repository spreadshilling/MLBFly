name: Daily MLB Data Fetcher

on:
  schedule:
    # Runs at 12:00 UTC every day (8:00 AM EDT)
    - cron: '0 12 * * *'
  # This line lets you trigger it manually via a button in GitHub!
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install MLB-StatsAPI

      - name: Run Data Scraper
        # Make sure your Python file is actually named scraper.py!
        run: python scraper.py 

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add daily_matchups.json
          # If the data is the same, it won't crash; it will just echo the message.
          git commit -m "⚾ Auto-update daily_matchups.json" || echo "No changes to commit"
          git push
